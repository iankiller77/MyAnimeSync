name: publish

on:
  release:
    types:
      - released
  workflow_dispatch:

jobs:
  call:
    uses: iankiller77/jellyfin-meta-plugins/.github/workflows/publish.yaml@master
    with:
      version: ${{ github.event.release.tag_name }}
      is-unstable: ${{ github.event.release.prerelease }}
    secrets:
      token: ${{ secrets.MY_GITHUB_TOKEN }}
