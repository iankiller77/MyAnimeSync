name: '📝 Create/Update Release Draft & Release Bump PR'

on:
  push:
    branches:
      - main
    paths-ignore:
      - build.yaml
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-prep-command

jobs:
  call:
    uses: jellyfin/jellyfin-meta-plugins/.github/workflows/changelog.yaml@master
    with:
      repository-name: iankiller77/jellyfin-plugin-template
    secrets:
      token: ${{secrets.MY_GITHUB_TOKEN}}
